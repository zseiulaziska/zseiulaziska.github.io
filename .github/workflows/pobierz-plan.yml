name: Aktualizacja Planu i Wdrożenie Astro

on:
  schedule:
    - cron: '0 * * * *' # Co godzinę
  workflow_dispatch: # Przycisk "uruchom ręcznie" w panelu GitHub Actions

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kodu
        uses: actions/checkout@v4

      - name: Pobierz najnowszy JSON z Google Apps Script
        run: |
          curl -L "https://script.google.com/macros/s/AKfycbzYPxvMsGeyF2EJifCNa3quATvk3rnsaqcf04mlgMrCnCZ1iSI_k3YI9W3LFEcUJ9S4/exec" -o public/plan.json

      - name: Sprawdź czy plik JSON się zmienił
        id: git-check
        run: |
          git diff --quiet public/plan.json || echo "changed=true" >> $GITHUB_OUTPUT

      # --- PONIŻSZE KROKI URUCHOMIĄ SIĘ TYLKO JEŚLI WYKRYTO ZMIANĘ LUB KLIKNIĘTO RĘCZNIE ---
      
      - name: Setup Node.js (potrzebne do Astro)
        if: steps.git-check.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Instalacja zależności i Budowanie Astro
        if: steps.git-check.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          npm ci
          npm run build

      - name: Wdrożenie na GitHub Pages
        if: steps.git-check.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # domyślny folder wynikowy Astro
          branch: gh-pages # gałąź, z której serwowane jest GitHub Pages

      - name: Zapisz zmieniony plik JSON z powrotem do repozytorium (żeby stan się zgadzał)
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git commit -am "Automatyczna aktualizacja bazy planu [skip ci]"
          git push
