name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ] # Lub 'master', zależnie od Twojej głównej gałęzi
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

env:
  ASTRO_TELEMETRY_DISABLED: 1

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      # --- TUTAJ JEST POPRAWKA: WYMUSZENIE NODE.JS 22 ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm' # Automatycznie przyspieszy kolejne instalacje pakietów
      # --------------------------------------------------
        
      - name: Install, lint, build or cache
        uses: withastro/action@v3
        # Jeśli używasz pnpm zamiast npm, odkomentuj te dwie linie poniżej:
        # with:
        #   package-manager: pnpm@latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4